{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div style="max-width:360px;margin:5rem auto">
  <div class="card">
    <div class="card-header gold"><i class="bi bi-shield-lock me-2"></i>Admin Access</div>
    <div class="p-4">
      <form method="POST" action="{{ url_for('admin_login') }}">
        <input type="hidden" name="next" value="{{ next }}">
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" autofocus required>
        </div>
        <button class="btn btn-gold w-100">Unlock</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
